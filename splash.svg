<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
    <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#5A7ACD" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#2B2A2A" stop-opacity="0"/>
        </radialGradient>
        <filter id="blurFilter">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
        </filter>
    </defs>
    <rect width="800" height="800" fill="#2B2A2A" />
    <circle cx="400" cy="400" r="300" fill="url(#glow)" filter="url(#blurFilter)" />
    
    <g transform="translate(400 400)">
        <circle cx="0" cy="0" r="150" fill="none" stroke="#F5F2F2" stroke-width="1" stroke-dasharray="4 8" opacity="0.5">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
        </circle>
        
        <path d="M -200 0 A 200 200 0 1 0 200 0 A 200 200 0 1 0 -200 0" fill="none" stroke="#5A7ACD" stroke-width="3" stroke-dasharray="150 1100" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4s" repeatCount="indefinite" />
        </path>

        <path d="M -250 0 A 250 250 0 1 0 250 0 A 250 250 0 1 0 -250 0" fill="none" stroke="#FEB05D" stroke-width="2" stroke-dasharray="50 1500" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" />
        </path>

        <polygon points="0,-40 34,20 -34,20" fill="none" stroke="#F5F2F2" stroke-width="2">
            <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="5s" repeatCount="indefinite" />
        </polygon>
    </g>
    
    <text x="50%" y="50%" font-family="monospace" font-size="24" fill="#F5F2F2" font-weight="bold" text-anchor="middle" dominant-baseline="middle" letter-spacing="8">
        INITIALIZING
        <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
    </text>
</svg>
